events {
    worker_connections 1024;
}

http {
    upstream backend-red {
        server backend-red:8000;
    }

    upstream backend-blue {
        server backend-blue:8000;
    }

    upstream frontend-red {
        server frontend-red:80;
    }

    upstream frontend-blue {
        server frontend-blue:80;
    }

    # Main application - redirects based on team
    server {
        listen 80;
        server_name pokemon-drafter.local;

        location / {
            # Default landing page
            return 302 /login;
        }

        location /login {
            proxy_pass http://frontend-red/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Red team frontend
    server {
        listen 80;
        server_name red.pokemon-drafter.local;

        location / {
            proxy_pass http://frontend-red;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass http://backend-red/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ws/ {
            proxy_pass http://kafka:9092;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Blue team frontend
    server {
        listen 80;
        server_name blue.pokemon-drafter.local;

        location / {
            proxy_pass http://frontend-blue;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass http://backend-blue/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ws/ {
            proxy_pass http://kafka:9092;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
