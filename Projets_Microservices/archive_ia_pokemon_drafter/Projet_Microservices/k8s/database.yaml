apiVersion: v1
kind: Namespace
metadata:
  name: pokemon-drafter
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
  namespace: pokemon-drafter
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: pokemon-drafter
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: pokemon-drafter
data:
  POSTGRES_DB: pokemon_db
  POSTGRES_USER: pokemon_user
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: pokemon-drafter
type: Opaque
data:
  POSTGRES_PASSWORD: cG9rZW1vbl9wYXNzMTIz  # pokemon_pass123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: pokemon-drafter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: pokemon-drafter
spec:
  selector:
    app: database
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
