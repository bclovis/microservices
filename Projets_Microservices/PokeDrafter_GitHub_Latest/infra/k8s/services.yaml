apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: pokedrafter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: pokedrafter/auth-service:latest
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://postgres:postgres@postgres:5432/auth_db
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: pokedrafter
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8000
---
