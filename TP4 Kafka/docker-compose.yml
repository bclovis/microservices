version: '3.8'

services:
  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  db-orders:
    image: postgres:15
    container_name: db-orders
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orders_db
    ports:
      - "5432:5432"
    volumes:
      - orders-data:/var/lib/postgresql/data


      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-inventory:
    image: postgres:15
    container_name: db-inventory
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inventory_db
    ports:
      - "5433:5432"
    volumes:
      - inventory-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  orders-service:
    build: ./orders-service
    container_name: orders-service
    ports:
      - "8001:8000"
    depends_on:
      broker:
        condition: service_started
      db-orders:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:password@db-orders:5432/orders_db
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
    restart: on-failure

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "8002:8000"
    depends_on:
      broker:
        condition: service_started
      db-inventory:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:password@db-inventory:5432/inventory_db
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
    restart: on-failure

  notifications-service:
    build: ./notifications-service
    container_name: notifications-service
    depends_on:
      - broker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
    restart: on-failure

  payment-service:
    build: ./payment-service
    container_name: payment-service
    depends_on:
      - broker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
    restart: on-failure

volumes:
  orders-data:
  inventory-data:
