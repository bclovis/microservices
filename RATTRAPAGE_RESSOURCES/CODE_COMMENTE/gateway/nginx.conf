# =============================================================================
# GATEWAY — nginx.conf
# Configuration du reverse proxy Nginx
# =============================================================================
# RÔLE DU FICHIER :
# Nginx est le point d'entrée UNIQUE de toute l'architecture.
# Tout le trafic (HTTP et WebSocket) passe par lui sur le port 80.
# Il redirige chaque requête vers le bon microservice selon le chemin URL.
#
# SANS GATEWAY :
#   Frontend doit connaître : localhost:8001, localhost:8002, localhost:8003...
#   Problème CORS : chaque service doit autoriser le frontend
#   Pas de point centralisé pour la sécurité
#
# AVEC GATEWAY (Nginx) :
#   Frontend parle uniquement à localhost:80
#   Nginx route vers le bon service en interne
#   CORS géré en UN SEUL endroit
# =============================================================================

# BLOC events : configuration du worker nginx
events {
    # Nombre max de connexions simultanées par worker
    # 1024 = valeur standard suffisante pour dev
    worker_connections 1024;
}

http {
    # Types MIME : associe les extensions de fichiers aux Content-Type HTTP
    include       mime.types;
    default_type  application/octet-stream;  # Type par défaut si non reconnu

    # ==========================================================================
    # UPSTREAMS — Résolution DNS interne Docker
    # ==========================================================================
    # "upstream" définit un groupe de serveurs backend
    # Docker Compose crée un réseau interne où les noms de services = noms DNS
    # Ex: "auth_service" dans le réseau Docker = l'adresse IP du container auth_service
    # On utilise le port SUR LEQUEL uvicorn écoute DANS le container
    upstream auth_service    { server auth_service:8001; }
    upstream team_service    { server team_service:8002; }
    upstream battle_service  { server battle_service:8003; }
    upstream pokedex_service { server pokedex_service:8004; }
    upstream chat_service    { server chat_service:8005; }
    # Chaque service écoute sur son propre port (défini dans son CMD Dockerfile)
    # Ce sont des ports INTERNES au réseau Docker, pas les ports exposés à l'hôte

    server {
        listen 80;  # Nginx écoute sur le port 80 (HTTP standard)
        # En prod, on ajouterait listen 443 ssl; pour HTTPS

        # =======================================================================
        # HEADERS DE PROXY — Passer les infos du client original aux backends
        # =======================================================================
        # Sans ces headers, les backends verraient toutes les requêtes comme
        # venant de Nginx (IP interne Docker) et non du vrai client
        proxy_set_header Host $host;                        # Nom de domaine original
        proxy_set_header X-Real-IP $remote_addr;           # IP du client original
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Chaîne d'IPs
        proxy_set_header X-Forwarded-Proto $scheme;        # http ou https

        # =======================================================================
        # CORS — Cross-Origin Resource Sharing
        # =======================================================================
        # On cache les headers CORS que les backends pourraient renvoyer
        # pour éviter les doublons (deux headers ACAO = erreur navigateur)
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';

        # Nginx ajoute LUI-MÊME les headers CORS
        # always = même sur les réponses d'erreur (4xx, 5xx)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Gestion des requêtes OPTIONS (preflight CORS)
        # Le navigateur envoie OPTIONS AVANT une vraie requête cross-origin
        # pour vérifier si elle est autorisée
        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header 'Access-Control-Max-Age' 1728000;  # 20 jours : le navigateur ne re-demandera pas
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;  # No Content : réponse minimale pour le preflight
            }
        }

        # =======================================================================
        # ROUTING HTTP — Redirection vers les microservices
        # =======================================================================
        # Nginx matche le chemin URL et proxifie vers le bon upstream
        # proxy_pass : la requête est renvoyée au service backend
        # Le chemin /api/auth est conservé dans l'URL transmise au backend
        location /api/auth    { proxy_pass http://auth_service/api/auth; }
        location /api/teams   { proxy_pass http://team_service/api/teams; }
        location /api/battle  { proxy_pass http://battle_service/api/battle; }
        location /api/pokedex { proxy_pass http://pokedex_service/api/pokedex; }
        location /api/chat    { proxy_pass http://chat_service/api/chat; }

        # =======================================================================
        # ROUTING WEBSOCKET — Headers spéciaux nécessaires pour l'upgrade HTTP→WS
        # =======================================================================
        # Une connexion WebSocket commence par une requête HTTP avec :
        #   Upgrade: websocket
        #   Connection: Upgrade
        # Sans ces headers, Nginx traiterait la requête comme du HTTP normal
        # et la connexion WebSocket échouerait
        location /ws/ {
            proxy_http_version 1.1;          # WebSocket nécessite HTTP/1.1 (keep-alive)
            proxy_set_header Upgrade $http_upgrade;      # Passe le header "Upgrade: websocket"
            proxy_set_header Connection "upgrade";        # Indique à Nginx de garder la connexion ouverte
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Toutes les connexions WS (/ws/chat/red, /ws/battle/uuid) → chat_service
            proxy_pass http://chat_service;
        }
    }
}
